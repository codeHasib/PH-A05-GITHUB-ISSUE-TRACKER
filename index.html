<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Daisy UI & Tailwind Connect-->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome Connect -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Default Styles -->
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
      .line-container {
        width: 100%;
        text-align: center;
        border-bottom: 1px solid #e0e0e0;
        line-height: 0.1px;
        margin: 20px 0;
      }

      .line-container span {
        background: #fff;
        padding: 0 10px;
        color: #666;
      }

    </style>

    <title>GitHub Issue Tracker | Login</title>
  </head>
  <body id="loginPage">
    <!-- Login Form -->
    <section
      class="w-full h-screen flex items-center justify-center bg-base-300"
    >
      <fieldset
        class="fieldset bg-white border-base-300 rounded-box w-xs border p-4"
      >
        <div class="w-full space-y-1 flex flex-col justify-center items-center">
          <img class="w-[20%]" src="assets/github-logo.png" alt="" />
          <h2 class="font-bold text-xl">GitHub Issues Tracker</h2>
          <p class="text-gray-400 text-[12px]">Sign in to manage your issues</p>
        </div>

        <label class="label text-black font-bold">Username</label>
        <input type="text" id="nameInput" class="input" placeholder="Enter Username" />
        <p class="text-violet-600">Default: admin</p>

        <label class="label text-black font-bold">Password</label>
        <input type="password" id="passwordInput" class="input" placeholder="Enter Password" />
        <p class="text-violet-600">Default: admin123</p>

        <button id="loginBtn" class="btn btn-primary mt-4">Login</button>

        <div class="line-container">
          <span>OR</span>
        </div>

        <p class="text-center text-gray-500">
            Demo Credentials
        </p>

        <div class="p-5 text-center font-bold bg-base-300 rounded-xl">
            <h3>Username: <span class="font-normal">admin</span></h3>
            <h3>Password: <span class="font-normal">admin123</span></h3>
        </div>
      </fieldset>
    </section>

  </body>

  <script src="scripts/script.js"></script>
</html>
